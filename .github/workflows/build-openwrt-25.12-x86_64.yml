name: Build OpenWrt 25.12 x86_64

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths-ignore:
      - "README.md"
      - "screenshots/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "screenshots/**"

permissions:
  contents: write

concurrency:
  group: openwrt-25.12-x86_64-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENWRT_VERSION: 25.12.5
  OPENWRT_TARGET: x86/64
  SDK_ARCHIVE: openwrt-sdk-25.12.5-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst

jobs:
  build:
    name: OpenWrt 25.12.5 / x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget zstd

      - name: Cache SDK and downloads
        uses: actions/cache@v4
        with:
          path: |
            sdk-cache
            openwrt-sdk/dl
          key: openwrt-sdk-${{ env.OPENWRT_VERSION }}-x86_64-${{ hashFiles('Makefile') }}
          restore-keys: |
            openwrt-sdk-${{ env.OPENWRT_VERSION }}-x86_64-

      - name: Download and verify OpenWrt SDK
        shell: bash
        run: |
          set -euo pipefail

          base_url="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}"
          mkdir -p sdk-cache openwrt-sdk

          if [ ! -f "sdk-cache/${SDK_ARCHIVE}" ]; then
            wget --progress=dot:giga -O "sdk-cache/${SDK_ARCHIVE}" "${base_url}/${SDK_ARCHIVE}"
          fi

          wget -qO sdk-cache/sha256sums "${base_url}/sha256sums"

          # Accept the binary marker (*) and optional path prefixes used in sha256sums.
          expected_hash="$(awk -v archive="${SDK_ARCHIVE}" '
            {
              file = $2
              sub(/^\*/, "", file)
              sub(/^.*\//, "", file)
              if (file == archive) {
                print $1
                exit
              }
            }
          ' sdk-cache/sha256sums)"

          if [ -z "$expected_hash" ]; then
            echo "ERROR: ${SDK_ARCHIVE} not found in sha256sums file." >&2
            echo "Available archive entries in sha256sums:" >&2
            grep -E '\.tar\.' sdk-cache/sha256sums >&2 || cat sdk-cache/sha256sums >&2
            exit 1
          fi

          actual_hash=$(sha256sum "sdk-cache/${SDK_ARCHIVE}" | awk '{print $1}')

          if [ "$expected_hash" != "$actual_hash" ]; then
            echo "ERROR: SHA256 mismatch for ${SDK_ARCHIVE}" >&2
            echo "  Expected: $expected_hash" >&2
            echo "  Actual:   $actual_hash" >&2
            exit 1
          fi

          echo "SDK archive verified: $actual_hash"

          tar --zstd -xf "sdk-cache/${SDK_ARCHIVE}" \
            --strip-components=1 -C openwrt-sdk

      - name: Prepare LuCI feed
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update luci
          ./scripts/feeds install -p luci luci-base

      - name: Add package source
        shell: bash
        run: |
          mkdir -p openwrt-sdk/package/luci-app-temp-status
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='sdk-cache/' \
            --exclude='openwrt-sdk/' \
            ./ openwrt-sdk/package/luci-app-temp-status/

      - name: Configure SDK
        working-directory: openwrt-sdk
        run: |
          cat > .config <<'EOF'
          CONFIG_PACKAGE_luci-app-temp-status=m
          CONFIG_LUCI_LANG_zh_Hans=y
          EOF
          make defconfig
          grep -q '^CONFIG_PACKAGE_luci-app-temp-status=m$' .config
          grep -q '^CONFIG_LUCI_LANG_zh_Hans=y$' .config
          grep -q '^CONFIG_PACKAGE_luci-i18n-temp-status-zh-cn=m$' .config

      - name: Compile package
        working-directory: openwrt-sdk
        run: |
          make package/luci-app-temp-status/compile -j"$(nproc)" V=s

      - name: Collect APK packages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          main_apk="$(find openwrt-sdk/bin/packages -type f \
            -name 'luci-app-temp-status*.apk' -print -quit)"
          zh_cn_apk="$(find openwrt-sdk/bin/packages -type f \
            -name 'luci-i18n-temp-status-zh-cn*.apk' -print -quit)"

          if [ -z "${main_apk}" ]; then
            echo 'ERROR: Main APK package was not generated.' >&2
            exit 1
          fi
          if [ -z "${zh_cn_apk}" ]; then
            echo 'ERROR: Simplified Chinese i18n APK package was not generated.' >&2
            exit 1
          fi

          cp -v "${main_apk}" "${zh_cn_apk}" artifacts/
          sha256sum artifacts/*.apk | tee artifacts/sha256sums

      - name: Upload APK packages
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-temp-status-openwrt-${{ env.OPENWRT_VERSION }}-x86_64
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              artifacts/*.apk artifacts/sha256sums --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              artifacts/*.apk artifacts/sha256sums \
              --title "luci-app-temp-status ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
